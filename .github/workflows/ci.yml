name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Server Build and Test
  server-build:
    name: Server Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore
      working-directory: src/server

    - name: Build
      run: dotnet build --configuration Release --no-restore
      working-directory: src/server

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
      working-directory: tests

  # Admin Panel Build
  admin-build:
    name: Admin Panel Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/admin/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: src/admin

    - name: Build
      run: npm run build
      working-directory: src/admin

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: admin-dist
        path: src/admin/dist/

  # Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [server-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build AuthService
      uses: docker/build-push-action@v5
      with:
        context: ./src/server/AuthService
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/localtelegram-authservice:${{ github.sha }}

    - name: Build MessageService
      uses: docker/build-push-action@v5
      with:
        context: ./src/server/MessageService
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/localtelegram-messageservice:${{ github.sha }}

    - name: Build FileService
      uses: docker/build-push-action@v5
      with:
        context: ./src/server/FileService
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/localtelegram-fileservice:${{ github.sha }}

    - name: Build PushService
      uses: docker/build-push-action@v5
      with:
        context: ./src/server/PushService
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/localtelegram-pushservice:${{ github.sha }}

    - name: Build ConferenceService
      uses: docker/build-push-action@v5
      with:
        context: ./src/server/ConferenceService
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/localtelegram-conferenceservice:${{ github.sha }}

    - name: Build AdminService
      uses: docker/build-push-action@v5
      with:
        context: ./src/server/AdminService
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/localtelegram-adminservice:${{ github.sha }}

    - name: Build MediaService
      uses: docker/build-push-action@v5
      with:
        context: ./src/server/MediaService
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/localtelegram-mediaservice:${{ github.sha }}

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

  # Code Quality
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install dotnet-format
      run: dotnet tool install -g dotnet-format

    - name: Check format
      run: dotnet-format --check --verbosity diagnostic
      working-directory: src/server
      continue-on-error: true

# LocalTelegram - Custom Microservices Configuration
# Additional services for extended functionality

networks:
  tg-net:
    driver: bridge

services:
  ### PushService - WebSocket and Push Notifications
  push-service:
    build:
      context: ./src/server/PushService
      dockerfile: Dockerfile
    restart: always
    networks:
      - tg-net
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Redis=redis:6379
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-localtelegram}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:-localtelegram123}
      - Jwt__SecretKey=${JWT_SECRET_KEY:-your-super-secret-key-here-min-32-characters!}
      - Jwt__Issuer=LocalTelegram
      - Jwt__Audience=LocalTelegram
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ### AuthService - Custom Authentication Service
  auth-service:
    build:
      context: ./src/server/AuthService
      dockerfile: Dockerfile
    restart: always
    networks:
      - tg-net
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${DB_NAME:-localtelegram};Username=${DB_USER:-localtelegram};Password=${DB_PASSWORD:-localtelegram123}
      - ConnectionStrings__Redis=redis:6379
      - Jwt__SecretKey=${JWT_SECRET_KEY:-your-super-secret-key-here-min-32-characters!}
      - Jwt__Issuer=LocalTelegram
      - Jwt__Audience=LocalTelegram
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ### MessageService - Custom Messaging Service
  message-service:
    build:
      context: ./src/server/MessageService
      dockerfile: Dockerfile
    restart: always
    networks:
      - tg-net
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${DB_NAME:-localtelegram};Username=${DB_USER:-localtelegram};Password=${DB_PASSWORD:-localtelegram123}
      - ConnectionStrings__Redis=redis:6379
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-localtelegram}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:-localtelegram123}
      - Jwt__SecretKey=${JWT_SECRET_KEY:-your-super-secret-key-here-min-32-characters!}
      - Jwt__Issuer=LocalTelegram
      - Jwt__Audience=LocalTelegram
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ### FileService - Custom File Storage Service
  file-service:
    build:
      context: ./src/server/FileService
      dockerfile: Dockerfile
    restart: always
    networks:
      - tg-net
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${DB_NAME:-localtelegram};Username=${DB_USER:-localtelegram};Password=${DB_PASSWORD:-localtelegram123}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ACCESS_KEY:-localtelegram}
      - MinIO__SecretKey=${MINIO_SECRET_KEY:-localtelegram123456}
      - MinIO__UseSSL=false
      - MinIO__BucketName=localtelegram-files
      - Jwt__SecretKey=${JWT_SECRET_KEY:-your-super-secret-key-here-min-32-characters!}
      - Jwt__Issuer=LocalTelegram
      - Jwt__Audience=LocalTelegram
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ### ApiGateway - YARP-based API Gateway
  api-gateway:
    build:
      context: ./src/server/ApiGateway
      dockerfile: Dockerfile
    restart: always
    networks:
      - tg-net
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY:-your-super-secret-key-here-min-32-characters!}
      - Jwt__Issuer=LocalTelegram
      - Jwt__Audience=LocalTelegram
    depends_on:
      auth-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      push-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ### UserService - User profiles and contacts
  user-service:
    build:
      context: ./src/server/UserService
      dockerfile: Dockerfile
    restart: always
    networks:
      - tg-net
    ports:
      - "5005:5005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${DB_NAME:-localtelegram};Username=${DB_USER:-localtelegram};Password=${DB_PASSWORD:-localtelegram123}
      - ConnectionStrings__Redis=redis:6379
      - Jwt__SecretKey=${JWT_SECRET_KEY:-your-super-secret-key-here-min-32-characters!}
      - Jwt__Issuer=LocalTelegram
      - Jwt__Audience=LocalTelegram
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ### PostgreSQL - Database for custom services
  postgres:
    image: postgres:16-alpine
    restart: always
    networks:
      - tg-net
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-localtelegram}
      POSTGRES_USER: ${DB_USER:-localtelegram}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localtelegram123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-localtelegram} -d ${DB_NAME:-localtelegram}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ### Redis - Caching and session storage (shared)
  redis:
    image: redis:8-alpine
    restart: always
    networks:
      - tg-net
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ### RabbitMQ - Message queue (shared)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    networks:
      - tg-net
    ports:
      - "15672:15672"  # Management UI
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-localtelegram}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-localtelegram123}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ### MinIO - Object storage (shared)
  minio:
    image: minio/minio:latest
    restart: always
    networks:
      - tg-net
    ports:
      - "9001:9001"  # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-localtelegram}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-localtelegram123456}
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  ### Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    networks:
      - tg-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

apiVersion: v1
kind: Secret
metadata:
  name: localtelegram-secrets
  namespace: localtelegram
type: Opaque
stringData:
  # MongoDB
  MONGODB_USERNAME: "admin"
  MONGODB_PASSWORD: "changeme"
  MONGODB_CONNECTION_STRING: "mongodb://admin:changeme@mongodb:27017/localtelegram?authSource=admin"
  
  # Redis
  REDIS_PASSWORD: "changeme"
  
  # RabbitMQ
  RABBITMQ_USERNAME: "admin"
  RABBITMQ_PASSWORD: "changeme"
  
  # MinIO
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "changeme"
  
  # JWT
  JWT_SECRET_KEY: "your-super-secret-key-change-in-production"
  
  # LDAP
  LDAP_BIND_DN: "cn=admin,dc=example,dc=com"
  LDAP_BIND_PASSWORD: "changeme"
  
  # LiveKit
  LIVEKIT_API_KEY: "changeme"
  LIVEKIT_API_SECRET: "changeme"
  
  # TURN Server
  TURN_SECRET: "changeme"
  
  # Admin Panel
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "changeme"

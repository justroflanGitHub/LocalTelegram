# LocalTelegram Alert Rules

groups:
  - name: service_health
    interval: 30s
    rules:
      # Service down alerts
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value }} requests/sec on {{ $labels.job }}"

      # Slow response time
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response time on {{ $labels.job }}"
          description: "95th percentile response time is {{ $value }}s"

  - name: database
    interval: 30s
    rules:
      # PostgreSQL connections
      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many PostgreSQL connections"
          description: "PostgreSQL has {{ $value }} active connections"

      # PostgreSQL replication lag
      - alert: PostgresReplicationLag
        expr: pg_replication_lag_seconds > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL replication lag"
          description: "Replication lag is {{ $value }}s"

      # PostgreSQL disk usage
      - alert: PostgresDiskUsageHigh
        expr: pg_database_size_bytes / node_filesystem_size_bytes{mountpoint="/var/lib/postgresql"} > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL disk usage high"
          description: "Database is using {{ $value | humanizePercentage }} of disk space"

  - name: redis
    interval: 30s
    rules:
      # Redis memory usage
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory"

      # Redis connections
      - alert: RedisTooManyConnections
        expr: redis_connected_clients > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many Redis connections"
          description: "Redis has {{ $value }} connected clients"

      # Redis replication
      - alert: RedisReplicationBroken
        expr: delta(redis_connected_slaves[1m]) < 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Redis replication broken"
          description: "Redis lost a replica"

  - name: storage
    interval: 30s
    rules:
      # MinIO storage usage
      - alert: MinioStorageHigh
        expr: minio_cluster_disk_storage_used_bytes / minio_cluster_disk_storage_total_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MinIO storage usage high"
          description: "MinIO is using {{ $value | humanizePercentage }} of storage"

      # MinIO offline disks
      - alert: MinioOfflineDisks
        expr: minio_cluster_disk_offline_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "MinIO has offline disks"
          description: "{{ $value }} disks are offline"

  - name: system
    interval: 30s
    rules:
      # CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}%"

      # Memory usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}%"

      # Disk usage
      - alert: DiskUsageHigh
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} usage is {{ $value }}%"

      # Disk usage critical
      - alert: DiskUsageCritical
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk usage on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} usage is {{ $value }}%"

  - name: application
    interval: 30s
    rules:
      # Active users anomaly
      - alert: ActiveUsersDrop
        expr: delta(localtelegram_active_users_total[5m]) < -100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sudden drop in active users"
          description: "Active users dropped by {{ $value }} in 5 minutes"

      # Message rate anomaly
      - alert: MessageRateDrop
        expr: delta(localtelegram_messages_total[5m]) < -1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sudden drop in message rate"
          description: "Message rate dropped significantly"

      # Conference quality
      - alert: ConferenceQualityDegraded
        expr: localtelegram_conference_packet_loss_percent > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Conference quality degraded"
          description: "Packet loss is {{ $value }}%"

      # File upload failures
      - alert: FileUploadFailures
        expr: rate(localtelegram_file_uploads_failed_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "File upload failures"
          description: "File upload failure rate is {{ $value }}/s"

  - name: rabbitmq
    interval: 30s
    rules:
      # Queue depth
      - alert: RabbitMQQueueDepth
        expr: rabbitmq_queue_messages > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue depth high"
          description: "Queue {{ $labels.queue }} has {{ $value }} messages"

      # Unacked messages
      - alert: RabbitMQUnackedMessages
        expr: rabbitmq_queue_messages_unacked > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ unacked messages high"
          description: "{{ $value }} messages are unacked"

      # Connection count
      - alert: RabbitMQConnectionCount
        expr: rabbitmq_connections > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ connection count high"
          description: "{{ $value }} connections to RabbitMQ"
